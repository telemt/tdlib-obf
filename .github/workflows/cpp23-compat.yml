name: Main Build CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/CMakeLists.txt'
      - 'CMake/**'
      - 'sqlite/**'
      - 'tools/sqlite/**'
      - 'test/sqlite_vendor_contract.cpp'
      - 'test/analysis/test_sqlite*.py'
      - 'test/analysis/test_sqlite_phase4_vendor_target_repo.py'
      - '.vscode/settings.json'
      - '.vscode/tasks.json'
      - '.github/workflows/cpp23-compat.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/CMakeLists.txt'
      - 'CMake/**'
      - 'sqlite/**'
      - 'tools/sqlite/**'
      - 'test/sqlite_vendor_contract.cpp'
      - 'test/analysis/test_sqlite*.py'
      - 'test/analysis/test_sqlite_phase4_vendor_target_repo.py'
      - '.vscode/settings.json'
      - '.vscode/tasks.json'
      - '.github/workflows/cpp23-compat.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cpp23-compat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-matrix:
    name: Core ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc15
            cc: gcc-15
            cxx: g++-15
          - compiler: clang22
            cc: clang-22
            cxx: clang++-22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up toolchain APT repositories
        run: |
          set -euxo pipefail
          # LLVM APT for clang-22 / lld-22
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq

          if [[ "${{ matrix.compiler }}" == "gcc15" ]]; then
            echo "TD_CI_CC=gcc-15" >> "$GITHUB_ENV"
            echo "TD_CI_CXX=g++-15" >> "$GITHUB_ENV"

            # Prefer already-available gcc-15/g++-15 on runner images.
            if command -v gcc-15 >/dev/null 2>&1 && command -v g++-15 >/dev/null 2>&1; then
              echo "gcc-15 and g++-15 are already available on the runner; skipping PPA setup"
            elif ! apt-cache show gcc-15 >/dev/null 2>&1; then
              # Add ubuntu-toolchain-r/test without add-apt-repository to avoid
              # Launchpad API lookups that are flaky on hosted runners.
              echo "deb https://ppa.launchpadcontent.net/ubuntu-toolchain-r/test/ubuntu noble main" \
                | sudo tee /etc/apt/sources.list.d/ubuntu-toolchain-r-test.list >/dev/null

              set +e
              ppa_update_output="$(sudo apt-get update -o APT::Update::Error-Mode=any 2>&1)"
              ppa_update_status=$?
              set -e

              if [[ "$ppa_update_status" -ne 0 ]]; then
                missing_keys="$(printf '%s\n' "$ppa_update_output" | sed -n 's/.*NO_PUBKEY \([0-9A-F]\+\).*/\1/p' | sort -u)"
                if [[ -n "$missing_keys" ]]; then
                  for key in $missing_keys; do
                    wget -qO- "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x${key}" \
                      | gpg --dearmor \
                      | sudo tee "/etc/apt/trusted.gpg.d/ubuntu-toolchain-r-${key}.gpg" >/dev/null
                  done

                  set +e
                  ppa_update_output="$(sudo apt-get update -o APT::Update::Error-Mode=any 2>&1)"
                  ppa_update_status=$?
                  set -e
                fi

                if [[ "$ppa_update_status" -ne 0 ]]; then
                  echo "$ppa_update_output" >&2
                  echo "WARNING: ubuntu-toolchain-r/test metadata is unavailable; this run will fall back to clang-22" >&2
                fi
              fi
            fi

            if command -v gcc-15 >/dev/null 2>&1 && command -v g++-15 >/dev/null 2>&1; then
              echo "Using preinstalled gcc-15/g++-15"
            elif apt-cache show gcc-15 >/dev/null 2>&1; then
              echo "gcc-15/g++-15 packages are available from apt and will be installed"
            else
              echo "TD_CI_CC=clang-22" >> "$GITHUB_ENV"
              echo "TD_CI_CXX=clang++-22" >> "$GITHUB_ENV"
              echo "WARNING: gcc-15 remains unavailable after repository setup; compiler switched to clang-22" >&2
            fi
          else
            echo "TD_CI_CC=clang-22" >> "$GITHUB_ENV"
            echo "TD_CI_CXX=clang++-22" >> "$GITHUB_ENV"
          fi

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-gcc-clang-${{ runner.os }}-${{ hashFiles('.github/workflows/cpp23-compat.yml') }}-v2

      - name: Install dependencies
        run: |
          set -euxo pipefail
          common_packages=(
            cmake
            ccache
            gperf
            libssl-dev
            make
            ninja-build
            zlib1g-dev
          )

          effective_cc="${TD_CI_CC:-${{ matrix.cc }}}"
          effective_cxx="${TD_CI_CXX:-${{ matrix.cxx }}}"

          if [[ "$effective_cc" == "gcc-15" && "$effective_cxx" == "g++-15" ]]; then
            if command -v gcc-15 >/dev/null 2>&1 && command -v g++-15 >/dev/null 2>&1; then
              sudo apt-get install -y "${common_packages[@]}"
            else
              sudo apt-get install -y "${common_packages[@]}" gcc-15 g++-15
            fi
          else
            sudo apt-get install -y "${common_packages[@]}" clang-22 lld-22
          fi

      - name: Cache ccache objects
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-core-${{ matrix.compiler }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-core-${{ matrix.compiler }}-${{ runner.os }}-

      - name: Run C++23 static guard
        run: python3 tools/ci/check_cpp23_compat.py

      - name: Run CMake probe guardrails
        run: python3 -m unittest discover -s test/analysis -p 'test_cmake_probe_guardrails.py'

      - name: Configure build
        env:
          CC: ${{ env.TD_CI_CC || matrix.cc }}
          CXX: ${{ env.TD_CI_CXX || matrix.cxx }}
          CCACHE_DIR: ~/.cache/ccache
          CCACHE_COMPRESS: "1"
          CCACHE_MAXSIZE: 500M
        run: |
          set -euxo pipefail
          cmake -S . -B build \
            -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DTD_ENABLE_BENCHMARKS=OFF \
            -DTD_ENABLE_LLD=ON \
            -DTD_STRICT_CI_WARNINGS=ON \
            -DTD_STRICT_COMPILER_VERSIONS=ON

      - name: Build core targets
        env:
          CCACHE_DIR: ~/.cache/ccache
        run: |
          set -euxo pipefail
          cmake --build build --target tdjson tg_cli run_all_tests --parallel $(nproc)

  asan-ubsan:
    name: ASan UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up toolchain APT repositories
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-asan-${{ runner.os }}-${{ hashFiles('.github/workflows/cpp23-compat.yml') }}-v2

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            clang-22 \
            lld-22 \
            ccache \
            cmake \
            gperf \
            libssl-dev \
            make \
            ninja-build \
            zlib1g-dev

      - name: Cache ccache objects
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-asan-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-asan-${{ runner.os }}-

      - name: Run C++23 static guard
        run: python3 tools/ci/check_cpp23_compat.py

      - name: Configure sanitizer build
        env:
          CC: clang-22
          CXX: clang++-22
          CCACHE_DIR: ~/.cache/ccache
          CCACHE_COMPRESS: "1"
          CCACHE_MAXSIZE: 500M
          # ccache and sanitizers: disable direct mode so sanitizer wrappers
          # are handled correctly. basedir normalises paths for cache portability.
          CCACHE_CPP2: "true"
          CCACHE_BASEDIR: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          cmake -S . -B build \
            -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-sanitize-recover=all' \
            -DCMAKE_C_FLAGS='-fsanitize=address,undefined -fno-sanitize-recover=all' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined -fno-sanitize-recover=all' \
            -DCMAKE_SHARED_LINKER_FLAGS='-fsanitize=address,undefined -fno-sanitize-recover=all' \
            -DTD_ENABLE_BENCHMARKS=OFF \
            -DTD_ENABLE_LLD=ON \
            -DTD_ENABLE_SPLIT_DWARF=OFF \
            -DTD_STRICT_CI_WARNINGS=ON \
            -DTD_STRICT_COMPILER_VERSIONS=ON

      - name: Build sanitizer targets
        env:
          CCACHE_DIR: ~/.cache/ccache
        run: |
          set -euxo pipefail
          cmake --build build --target tl_generate_tlo tl_generate_mtproto tl_generate_common tl_generate_json --parallel $(nproc)
          cmake --build build --target tdjson run_all_tests --parallel $(nproc)

      - name: Run focused sanitizer regression slice
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          set -euxo pipefail
          ./build/test/run_all_tests --filter TlsHello

  tsan:
    name: TSan concurrency
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up toolchain APT repositories
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-tsan-${{ runner.os }}-${{ hashFiles('.github/workflows/cpp23-compat.yml') }}-v2

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            clang-22 \
            lld-22 \
            ccache \
            cmake \
            gperf \
            libssl-dev \
            make \
            ninja-build \
            zlib1g-dev

      - name: Cache ccache objects
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-tsan-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-tsan-${{ runner.os }}-

      - name: Configure TSan build
        env:
          CC: clang-22
          CXX: clang++-22
          CCACHE_DIR: ~/.cache/ccache
          CCACHE_COMPRESS: "1"
          CCACHE_MAXSIZE: 500M
          CCACHE_CPP2: "true"
          CCACHE_BASEDIR: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          cmake -S . -B build \
            -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_FLAGS='-fsanitize=thread -fno-sanitize-recover=all' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=thread -fno-sanitize-recover=all' \
            -DTD_ENABLE_BENCHMARKS=OFF \
            -DTD_ENABLE_LLD=ON \
            -DTD_ENABLE_SPLIT_DWARF=OFF \
            -DTD_STRICT_COMPILER_VERSIONS=ON

      - name: Build concurrency-heavy test targets
        env:
          CCACHE_DIR: ~/.cache/ccache
        run: |
          set -euxo pipefail
          cmake --build build --target tl_generate_tlo tl_generate_mtproto tl_generate_common tl_generate_json --parallel $(nproc)
          cmake --build build --target run_all_tests --parallel $(nproc)

      - name: Run TSan — actor/queue/buffer concurrency slice
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: |
          set -euxo pipefail
          ./build/test/run_all_tests --filter "stress|Stress|Soak|concurrent"