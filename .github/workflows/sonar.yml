name: SonarCloud TDLib

on:
  push:
    branches: [master]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/CMakeLists.txt'
      - 'CMake/**'
      - 'td/generate/**'
      - 'tdutils/generate/**'
      - 'sonar-project.properties'
      - '.github/workflows/sonar.yml'
  pull_request:
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/CMakeLists.txt'
      - 'CMake/**'
      - 'td/generate/**'
      - 'tdutils/generate/**'
      - 'sonar-project.properties'
      - '.github/workflows/sonar.yml'

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud requires full history for blame/new-code analysis
          persist-credentials: false

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-sonar-${{ runner.os }}-${{ hashFiles('.github/workflows/sonar.yml') }}-v1

      - name: Set up toolchain APT repositories
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            make git zlib1g-dev libssl-dev gperf php-cli cmake \
            clang-22 libc++-22-dev libc++abi-22-dev ninja-build lld-22

      - name: Configure TDLib for Sonar compilation database
        run: |
          set -euxo pipefail
          env CXXFLAGS="-stdlib=libc++" \
              CC=/usr/bin/clang-22 \
              CXX=/usr/bin/clang++-22 \
              cmake -S . -B build \
                    -G Ninja \
                    -DBUILD_SHARED_LIBS=ON \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                    -DTD_ENABLE_LLD=ON

      - name: Generate analysis inputs
        run: |
          set -euxo pipefail
          cmake --build build --target tl_generate_tlo tl_generate_mtproto tl_generate_common tl_generate_json tdmime_auto --parallel $(nproc)

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
